name: Build and Release

on:
  push:
    tags:
      - '*-release' # Triggers on tags ending with -release (e.g., 0.14.2-pro-release)

permissions:
  contents: write # Required for softprops/action-gh-release to create releases and upload assets

jobs:
  release:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install appdmg
        run: npm install appdmg # Local install to avoid global npm EACCES permission issues on CI

      - name: Build Xcode Project
        run: |
          xcodebuild -project IPMessenger.xcodeproj \
            -scheme IPMessenger \
            -configuration Debug \
            build \
            CONFIGURATION_BUILD_DIR=build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Codesign application bundle
        run: |
          codesign --force --deep --sign - build/IPMessenger.app

      - name: Build DMG Package
        run: |
          npx appdmg appdmg.json build/IPMessenger-Pro-Mac.dmg

      - name: Create GitHub Release and Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          files: build/IPMessenger-Pro-Mac.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
